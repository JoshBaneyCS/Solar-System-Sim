name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    strategy:
      matrix:
        include:
          - os: macos-latest          # Apple Silicon (ARM64)
            target: aarch64-apple-darwin
          - os: macos-13              # Intel Mac (AMD64)
            target: x86_64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libasound2-dev libudev-dev \
            libxkbcommon-dev libwayland-dev libx11-dev libxi-dev \
            libxcursor-dev libxrandr-dev libxinerama-dev \
            libgl1-mesa-dev libatk1.0-dev libgtk-3-dev

      - name: Run tests
        run: cargo test --workspace --target ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release -p solar_sim_bevy --target ${{ matrix.target }}
