name: Release

on:
  push:
    tags: ["v*"]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            platform: macos
            artifact: solar-sim-darwin-arm64.dmg
          - os: macos-13
            target: x86_64-apple-darwin
            platform: macos
            artifact: solar-sim-darwin-amd64.dmg
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            platform: linux
            artifact: solar-sim-linux-amd64.tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            platform: windows
            artifact: solar-sim-windows-amd64.zip

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libasound2-dev \
            libudev-dev \
            libxkbcommon-dev \
            libwayland-dev \
            libx11-dev \
            libxi-dev \
            libxcursor-dev \
            libxrandr-dev \
            libxinerama-dev \
            libgl1-mesa-dev \
            libatk1.0-dev \
            libgtk-3-dev

      - name: Build Bevy app (release)
        shell: bash
        env:
          CARGO_BUILD_TARGET: ${{ matrix.target }}
        run: |
          cargo build --release -p solar_sim_bevy --target ${{ matrix.target }}

      - name: Prepare binary
        shell: bash
        run: |
          mkdir -p bin
          if [ "${{ runner.os }}" = "Windows" ]; then
            cp target/${{ matrix.target }}/release/solar_sim_bevy.exe bin/solar-sim.exe
          else
            cp target/${{ matrix.target }}/release/solar_sim_bevy bin/solar-sim
            chmod +x bin/solar-sim
          fi

      - name: Build Go headless binary
        if: runner.os != 'Windows'
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Compile Go headless binary
        if: runner.os != 'Windows'
        shell: bash
        env:
          CGO_ENABLED: "0"
        run: |
          EXT=""
          go build -tags nogui -o "bin/solar-sim-headless${EXT}" ./cmd/solar-sim || true

      - name: Package
        shell: bash
        run: bash packaging/package-${{ matrix.platform }}.sh

      - name: Validate package
        shell: bash
        run: |
          echo "=== Validating ${{ matrix.artifact }} ==="
          if [ -f "${{ matrix.artifact }}" ]; then
            SIZE=$(stat -f%z "${{ matrix.artifact }}" 2>/dev/null || stat -c%s "${{ matrix.artifact }}" 2>/dev/null || echo 0)
            echo "Artifact size: $SIZE bytes"
            if [ "$SIZE" -lt 10000 ]; then
              echo "ERROR: Artifact is suspiciously small ($SIZE bytes)"
              exit 1
            fi
            echo "OK"
          else
            echo "ERROR: Artifact not found: ${{ matrix.artifact }}"
            exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: find artifacts -type f

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          files: |
            artifacts/solar-sim-darwin-arm64.dmg
            artifacts/solar-sim-darwin-amd64.dmg
            artifacts/solar-sim-linux-amd64.tar.gz
            artifacts/solar-sim-windows-amd64.zip
          body: |
            ## Solar System Simulator ${{ github.ref_name }}

            GPU-accelerated, physically accurate N-body solar system simulator built with Rust and Bevy.

            ### Downloads

            | Platform | File | Notes |
            |----------|------|-------|
            | macOS (Apple Silicon) | `solar-sim-darwin-arm64.dmg` | macOS 12+, right-click > Open on first launch |
            | macOS (Intel) | `solar-sim-darwin-amd64.dmg` | macOS 12+, right-click > Open on first launch |
            | Linux (x86_64) | `solar-sim-linux-amd64.tar.gz` | Requires Vulkan or OpenGL drivers |
            | Windows (x86_64) | `solar-sim-windows-amd64.zip` | Windows 10+ |

            All textures and assets are embedded in the binary — no additional files needed.

            ### Quick Start
            - **macOS**: Open the DMG, drag to Applications, double-click to launch
            - **Linux**: Extract and run `./solar-sim`
            - **Windows**: Extract and run `solar-sim.exe`
