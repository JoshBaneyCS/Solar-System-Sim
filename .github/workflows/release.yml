name: Release

on:
  push:
    tags: ["v*"]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            goarch: arm64
            platform: macos
            artifact: solar-sim-darwin-arm64.dmg
          - os: macos-latest
            goarch: amd64
            platform: macos
            artifact: solar-sim-darwin-amd64.dmg
          - os: ubuntu-latest
            goarch: amd64
            platform: linux
            artifact: solar-sim-linux-amd64.tar.gz
          - os: windows-latest
            goarch: amd64
            platform: windows
            artifact: solar-sim-windows-amd64.zip

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc libgl1-mesa-dev xorg-dev

      - name: Install Windows dependencies
        if: runner.os == 'Windows'
        run: choco install mingw -y

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            crates/physics_core/target
            crates/render_core/target
          key: ${{ runner.os }}-${{ matrix.goarch }}-rust-${{ hashFiles('crates/*/Cargo.lock', 'crates/*/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-${{ matrix.goarch }}-rust-

      - name: Build Rust physics_core
        run: |
          cd crates/physics_core && cargo build --release

      - name: Build Rust render_core
        run: |
          cd crates/render_core && cargo build --release

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('go.sum') }}
          restore-keys: ${{ runner.os }}-go-

      - name: Build GUI binary
        shell: bash
        env:
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "1"
        run: |
          mkdir -p bin
          EXT=""
          if [ "${{ runner.os }}" = "Windows" ]; then
            EXT=".exe"
            export CC=gcc
          fi
          # Cross-compile amd64 on Apple Silicon macOS
          if [ "$GOARCH" = "amd64" ] && [ "$(uname -m)" = "arm64" ] && [ "${{ runner.os }}" = "macOS" ]; then
            export CGO_CFLAGS="-arch x86_64"
            export CGO_LDFLAGS="-arch x86_64"
          fi
          go build -o "bin/solar-sim${EXT}" ./cmd/solar-sim

      - name: Build headless binary
        shell: bash
        env:
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          EXT=""
          if [ "${{ runner.os }}" = "Windows" ]; then
            EXT=".exe"
          fi
          go build -tags nogui -o "bin/solar-sim-headless${EXT}" ./cmd/solar-sim

      - name: Package
        shell: bash
        env:
          GOARCH: ${{ matrix.goarch }}
        run: bash packaging/package-${{ matrix.platform }}.sh

      - name: Bundle Rust shared libraries
        shell: bash
        run: |
          echo "=== Bundling Rust shared libraries ==="
          STAGING="staging-libs"
          mkdir -p "$STAGING"
          if [ "${{ runner.os }}" = "macOS" ]; then
            # .dylib files for macOS
            cp -v crates/physics_core/target/release/libphysics_core.dylib "$STAGING/" 2>/dev/null || true
            cp -v crates/render_core/target/release/librender_core.dylib "$STAGING/" 2>/dev/null || true
          elif [ "${{ runner.os }}" = "Linux" ]; then
            # .so files for Linux
            cp -v crates/physics_core/target/release/libphysics_core.so "$STAGING/" 2>/dev/null || true
            cp -v crates/render_core/target/release/librender_core.so "$STAGING/" 2>/dev/null || true
          elif [ "${{ runner.os }}" = "Windows" ]; then
            # .dll files for Windows
            cp -v crates/physics_core/target/release/physics_core.dll "$STAGING/" 2>/dev/null || true
            cp -v crates/render_core/target/release/render_core.dll "$STAGING/" 2>/dev/null || true
          fi
          echo "Bundled libraries:"
          ls -la "$STAGING/" || echo "No libraries to bundle"

      - name: Validate package contents
        shell: bash
        run: |
          echo "=== Validating ${{ matrix.artifact }} ==="
          if [ -f "${{ matrix.artifact }}" ]; then
            echo "Artifact exists: $(ls -la ${{ matrix.artifact }})"
            SIZE=$(stat -f%z "${{ matrix.artifact }}" 2>/dev/null || stat -c%s "${{ matrix.artifact }}" 2>/dev/null || echo 0)
            if [ "$SIZE" -lt 1000 ]; then
              echo "ERROR: Artifact is suspiciously small ($SIZE bytes)"
              exit 1
            fi
            echo "Artifact size: $SIZE bytes - OK"
          else
            echo "ERROR: Artifact not found: ${{ matrix.artifact }}"
            exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: find artifacts -type f

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          files: |
            artifacts/solar-sim-darwin-arm64.dmg
            artifacts/solar-sim-darwin-amd64.dmg
            artifacts/solar-sim-linux-amd64.tar.gz
            artifacts/solar-sim-windows-amd64.zip
          body: |
            ## Downloads

            | Platform | File | Notes |
            |----------|------|-------|
            | macOS (Apple Silicon) | `solar-sim-darwin-arm64.dmg` | macOS 12+, right-click > Open on first launch |
            | macOS (Intel) | `solar-sim-darwin-amd64.dmg` | macOS 12+, right-click > Open on first launch |
            | Linux (x86_64) | `solar-sim-linux-amd64.tar.gz` | Requires OpenGL 2.1+ |
            | Windows (x86_64) | `solar-sim-windows-amd64.zip` | Windows 10+ |

            Each archive includes both `solar-sim` (GUI) and `solar-sim-headless` (CLI-only) binaries, plus the `assets/` directory with planet textures and meshes.

            ### Quick Start
            ```bash
            # GUI mode
            solar-sim gui

            # Headless simulation
            solar-sim-headless run --years 1 --export output.csv
            ```
