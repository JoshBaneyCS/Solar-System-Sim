name: Lint

on:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libasound2-dev libudev-dev \
            libxkbcommon-dev libwayland-dev libx11-dev libxi-dev \
            libxcursor-dev libxrandr-dev libxinerama-dev \
            libgl1-mesa-dev libatk1.0-dev libgtk-3-dev

      - name: Cache Rust artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: lint-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: lint-cargo-

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace -- -D warnings
